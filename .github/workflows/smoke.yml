name: Smoke tests

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  smoke:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build & install td (path)
        run: cargo install --path . --locked --force

      - name: Smoke 1 – literal date
        run: |
          out=$(td "2025-06-25 13:00" -f "%Y-%m-%dT%H:%M")
          [[ "$out" == "2025-06-25T13:00" ]]

      - name: Smoke 2 – relative date
        run: |
          out=$(td "in 1 hour" -f "%s" --now "2025-01-01T00:00:00Z")
          [[ "$out" == "1735693200" ]]

      - name: Smoke 3 – preset resolution
        run: |
          cfg_root="$PWD/_tardis_cfg"
          mkdir -p "$cfg_root/tardis"
          export XDG_CONFIG_HOME="$cfg_root"
          cat > "$cfg_root/tardis/config.toml" <<'EOF'
          format = "%Y"
          timezone = "UTC"

          [formats]
          br = "%d/%m/%Y"
          EOF
          [[ "$(td "2025-12-31" -f br)" == "31/12/2025" ]]

      - name: Smoke 4 - diff subcommand
        run: |
          out=$(td diff "2025-01-01" "2025-01-10" --now "2025-01-01T00:00:00Z" -t UTC)
          echo "$out" | head -1 | grep -q "9 days"

      - name: Smoke 5 - convert subcommand
        run: |
          out=$(td convert "2025-01-01" --to epoch -t UTC)
          [[ "$out" == "1735689600" ]]

      - name: Smoke 6 - tz subcommand
        run: |
          out=$(td tz "2025-01-01 12:00" --from UTC --to "America/New_York")
          echo "$out" | grep -q "07:00:00"

      - name: Smoke 7 - info subcommand
        run: |
          out=$(td info "2025-01-01" --json -t UTC --now "2025-01-01T00:00:00Z")
          echo "$out" | grep -q '"weekday":"Wednesday"'

      - name: Smoke 8 - locale PT
        run: |
          out=$(td --locale pt "amanha" -f "%Y-%m-%d" -t UTC --now "2025-01-01T00:00:00Z")
          [[ "$out" == "2025-01-02" ]]

      - name: Smoke 9 - verbose flag
        run: |
          td --verbose "tomorrow" --now "2025-01-01T00:00:00Z" -t UTC 2>/tmp/verbose.txt
          grep -q "\[config\]" /tmp/verbose.txt
          grep -q "\[timing\]" /tmp/verbose.txt

      - name: Smoke 10 - batch with skip-errors
        run: |
          out=$(printf "2025-01-01\n???\n2025-01-02" | td -f "%Y-%m-%d" -t UTC --skip-errors --now "2025-01-01T00:00:00Z" 2>/dev/null)
          echo "$out" | head -1 | grep -q "2025-01-01"

      - name: Smoke 11 - arithmetic
        run: |
          out=$(td "tomorrow + 3 hours" -f "%Y-%m-%dT%H:%M:%S" -t UTC --now "2025-01-01T00:00:00Z")
          [[ "$out" == "2025-01-02T03:00:00" ]]

      - name: Smoke 12 - range expression
        run: |
          out=$(td "2025-01-01..2025-01-03" -f "%Y-%m-%d" -t UTC --now "2025-01-01T00:00:00Z")
          echo "$out" | head -1 | grep -q "2025-01-01"
          echo "$out" | tail -1 | grep -q "2025-01-03"
