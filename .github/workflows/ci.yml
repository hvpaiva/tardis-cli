name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install nextest and llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Test with coverage
        run: |
          cargo llvm-cov nextest --lcov --output-path lcov.info
          cargo llvm-cov report --fail-under-lines 80

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Audit
        run: cargo deny check

      - name: Install cocogitto
        uses: taiki-e/install-action@v2
        with:
          tool: cocogitto@7

      - name: Validate commits
        run: cog check

      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  guard-release-files:
    name: Guard release files
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for manual changelog or version edits
        env:
          BASE_REF: ${{ github.base_ref }}
          SKIP_RELEASE_GUARD: ${{ contains(github.event.pull_request.labels.*.name, 'release-override') && '1' || '' }}
        run: ./scripts/guard-release-files.sh --pr "$BASE_REF"

  man-pages:
    name: Man Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Generate man pages
        run: |
          mkdir -p docs/man-check
          for src in docs/td*.1.md; do
            name=$(basename "$src" .md)
            pandoc "$src" -s -t man -o "docs/man-check/$name"
          done

      - name: Compare with committed snapshots
        run: |
          diff -r docs/man docs/man-check || {
            echo "::error::Man page snapshots are out of date. Run 'just man' and commit the results."
            exit 1
          }

  semver:
    name: Semver checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Check semver
        run: cargo semver-checks check-release

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.85

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
